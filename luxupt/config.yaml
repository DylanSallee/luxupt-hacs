name: "LuxUPT"
version: "1.2.1"
slug: "luxupt"
description: "Time-lapse videos from UniFi Protect cameras"
url: "https://github.com/DylanSallee/luxupt-hacs"
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
hassio_api: true
hassio_role: admin
homeassistant_api: true

ingress: true
ingress_port: 8080
panel_icon: mdi:camera-timer
panel_title: "LuxUPT"

map:
  - share:rw

ports:
  8080/tcp: 8080

options:
  unifi_protect:
    api_key: ""
    base_url: ""
    verify_ssl: false
  web:
    username: ""
    password: ""
  log_level: "INFO"

schema:
  unifi_protect:
    api_key: str
    base_url: str
    verify_ssl: bool
  web:
    username: str?
    password: password?
  log_level: list(DEBUG|INFO|WARNING|ERROR)

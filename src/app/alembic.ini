# Alembic configuration for LuxUPT
# This file is used by alembic to manage database migrations

[alembic]
# Path to migration scripts (relative to this file)
script_location = db/migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate long revision hashes in file names
truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions
# sourceless = false

# Version path separator - use os.pathsep by default
# version_path_separator = os.pathsep

# Prepend sys.path with location
prepend_sys_path = .

# Timezone for revision timestamps (default UTC)
# timezone = UTC

# Output encoding for revision files
output_encoding = utf-8

# SQLAlchemy URL - overridden in env.py for async support
sqlalchemy.url = sqlite+aiosqlite:///output/timelapse.db

[post_write_hooks]
# Hooks to run after generating new revision files

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
